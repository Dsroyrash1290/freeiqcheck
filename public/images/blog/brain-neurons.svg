<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Stylized brain neuron network illustration">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#d9e6ff"/>
    </linearGradient>
    <linearGradient id="node" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5a92ff"/>
      <stop offset="100%" stop-color="#2550ea"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg)" rx="24"/>
  <g fill="none" stroke="#bcd4ff" stroke-width="2" opacity="0.9">
    <path d="M120 240 C220 120, 320 360, 400 240 S580 120, 680 240"/>
    <path d="M160 320 C260 200, 360 400, 460 280 S620 180, 720 300"/>
    <path d="M200 160 C300 80, 400 300, 500 180 S640 100, 700 200"/>
  </g>
  <g fill="url(#node)">
    <circle cx="120" cy="240" r="14"/><circle cx="280" cy="180" r="10"/><circle cx="400" cy="240" r="18"/>
    <circle cx="520" cy="300" r="12"/><circle cx="680" cy="240" r="14"/><circle cx="340" cy="340" r="9"/>
    <circle cx="580" cy="160" r="11"/><circle cx="220" cy="300" r="8"/>
  </g>
  <ellipse cx="400" cy="240" rx="120" ry="90" fill="#2550ea" opacity="0.08"/>
  <text x="400" y="430" text-anchor="middle" font-family="system-ui,sans-serif" font-size="18" fill="#1e35ad" opacity="0.7">Neural connections strengthen with learning</text>
</svg>
