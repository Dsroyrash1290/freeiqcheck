<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" role="img" aria-labelledby="evo-title evo-desc">
  <title id="evo-title">Evolution of Intelligence Testing</title>
  <desc id="evo-desc">Four phases from early testing through online adaptive testing.</desc>
  <rect width="800" height="200" fill="#ffffff" rx="20" stroke="#e2e8f0" stroke-width="1"/>
  <text x="400" y="32" text-anchor="middle" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="17" font-weight="700" fill="#1e293b">Evolution of Intelligence Testing</text>
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#2550ea"/>
    </marker>
  </defs>
  <g font-family="Inter,system-ui,sans-serif">
    <rect x="30" y="70" width="155" height="80" rx="14" fill="#eef4ff" stroke="#2550ea" stroke-width="1.5"/>
    <text x="107" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1d3fd6">Early Testing</text>
    <text x="107" y="122" text-anchor="middle" font-size="9" fill="#64748b">Observation</text>
    <text x="107" y="136" text-anchor="middle" font-size="9" fill="#64748b">and interviews</text>
    <line x1="190" y1="110" x2="210" y2="110" stroke="#2550ea" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="215" y="70" width="155" height="80" rx="14" fill="#eef4ff" stroke="#3b6ff5" stroke-width="1.5"/>
    <text x="292" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#1d3fd6">Standardized</text>
    <text x="292" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1d3fd6">Testing</text>
    <text x="292" y="136" text-anchor="middle" font-size="9" fill="#64748b">Norms and scales</text>
    <line x1="375" y1="110" x2="395" y2="110" stroke="#2550ea" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="400" y="70" width="155" height="80" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="477" y="102" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Psychological</text>
    <text x="477" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Testing</text>
    <text x="477" y="136" text-anchor="middle" font-size="9" fill="#64748b">Clinical batteries</text>
    <line x1="560" y1="110" x2="580" y2="110" stroke="#2550ea" stroke-width="2" marker-end="url(#arr)"/>
    <rect x="585" y="70" width="185" height="80" rx="14" fill="#ecfdf5" stroke="#10b981" stroke-width="1.5"/>
    <text x="677" y="98" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Online Adaptive</text>
    <text x="677" y="114" text-anchor="middle" font-size="11" font-weight="600" fill="#047857">Testing</text>
    <text x="677" y="132" text-anchor="middle" font-size="9" fill="#64748b">Web quizzes and apps</text>
  </g>
</svg>
