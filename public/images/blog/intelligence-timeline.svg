<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-label="Intelligence development timeline across the lifespan">
  <rect width="800" height="480" fill="#f8fafc" rx="24"/>
  <line x1="100" y1="280" x2="700" y2="280" stroke="#cbd5e1" stroke-width="4"/>
  <g font-family="system-ui,sans-serif" text-anchor="middle">
    <circle cx="160" cy="280" r="14" fill="#2550ea"/>
    <text x="160" y="320" font-size="14" fill="#334155">Childhood</text>
    <circle cx="320" cy="280" r="14" fill="#3b6ff5"/>
    <text x="320" y="320" font-size="14" fill="#334155">Teens</text>
    <circle cx="480" cy="280" r="14" fill="#5a92ff"/>
    <text x="480" y="320" font-size="14" fill="#334155">Adulthood</text>
    <circle cx="640" cy="280" r="14" fill="#10b981"/>
    <text x="640" y="320" font-size="14" fill="#334155">Lifelong</text>
  </g>
  <path d="M160 200 Q320 120, 480 180 T640 160" fill="none" stroke="#2550ea" stroke-width="3" stroke-dasharray="8 4"/>
  <text x="400" y="56" text-anchor="middle" font-size="20" font-weight="600" fill="#1e293b">Cognitive Change Across Life</text>
  <text x="400" y="400" text-anchor="middle" font-size="16" fill="#64748b">Environment and habits shape performance at every stage</text>
</svg>
