<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" role="img" aria-labelledby="pop-title pop-desc">
  <title id="pop-title">Growth of IQ testing popularity over time</title>
  <desc id="pop-desc">Illustrative line chart showing rising interest in IQ testing from the early 1900s through online tests today. Not actual research data.</desc>
  <rect width="800" height="400" fill="#f8fafc" rx="20"/>
  <text x="400" y="36" text-anchor="middle" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="18" font-weight="700" fill="#1e293b">Growth of IQ Testing Popularity Over Time</text>
  <line x1="80" y1="300" x2="720" y2="300" stroke="#cbd5e1" stroke-width="1.5"/>
  <line x1="80" y1="300" x2="80" y2="80" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="400" y="350" text-anchor="middle" font-size="12" fill="#64748b" font-family="Inter,system-ui,sans-serif">Era</text>
  <text x="36" y="190" text-anchor="middle" transform="rotate(-90 36 190)" font-size="12" fill="#64748b" font-family="Inter,system-ui,sans-serif">Popularity (illustrative)</text>
  <path d="M80,290 L180,275 L280,250 L380,220 L480,175 L580,130 L680,95 L720,80" fill="none" stroke="#2550ea" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M80,290 L180,275 L280,250 L380,220 L480,175 L580,130 L680,95 L720,80 L720,300 L80,300 Z" fill="#2550ea" opacity="0.08"/>
  <g font-family="Inter,system-ui,sans-serif" font-size="10" fill="#64748b" text-anchor="middle">
    <text x="130" y="318">1900s</text>
    <text x="230" y="318">1920s</text>
    <text x="330" y="318">1950s</text>
    <text x="430" y="318">1980s</text>
    <text x="530" y="318">2000s</text>
    <text x="630" y="318">2010s</text>
    <text x="700" y="318">2020s</text>
  </g>
  <circle cx="80" cy="290" r="4" fill="#2550ea"/>
  <circle cx="720" cy="80" r="4" fill="#10b981"/>
  <rect x="200" y="58" width="400" height="28" rx="8" fill="#fef9c3" stroke="#facc15" stroke-width="1"/>
  <text x="400" y="77" text-anchor="middle" font-size="11" fill="#854d0e" font-family="Inter,system-ui,sans-serif">Illustrative educational graphic. Not actual research data.</text>
</svg>
