<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" role="img" aria-labelledby="feat-title">
  <title id="feat-title">History of intelligence testing</title>
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#eef4ff"/>
      <stop offset="100%" stop-color="#ecfdf5"/>
    </linearGradient>
  </defs>
  <rect width="800" height="480" fill="url(#bg2)" rx="24"/>
  <text x="400" y="48" text-anchor="middle" font-family="Plus Jakarta Sans,system-ui,sans-serif" font-size="22" font-weight="700" fill="#1e35ad">From Binet to the Browser</text>
  <text x="400" y="78" text-anchor="middle" font-family="Inter,system-ui,sans-serif" font-size="14" fill="#64748b">A century of intelligence measurement</text>
  <rect x="120" y="120" width="560" height="8" rx="4" fill="#bcd4ff"/>
  <rect x="120" y="120" width="420" height="8" rx="4" fill="#2550ea"/>
  <circle cx="160" cy="124" r="18" fill="#2550ea" stroke="#fff" stroke-width="3"/>
  <text x="160" y="129" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">05</text>
  <circle cx="320" cy="124" r="18" fill="#3b6ff5" stroke="#fff" stroke-width="3"/>
  <text x="320" y="129" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">16</text>
  <circle cx="480" cy="124" r="18" fill="#5a92ff" stroke="#fff" stroke-width="3"/>
  <text x="480" y="129" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">55</text>
  <circle cx="640" cy="124" r="18" fill="#10b981" stroke="#fff" stroke-width="3"/>
  <text x="640" y="129" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">26</text>
  <g font-family="Inter,system-ui,sans-serif" text-anchor="middle" font-size="13" fill="#334155">
    <text x="160" y="175">Binet-Simon</text>
    <text x="320" y="175">Stanford-Binet</text>
    <text x="480" y="175">Wechsler WAIS</text>
    <text x="640" y="175">Online tests</text>
  </g>
  <rect x="100" y="220" width="600" height="180" rx="16" fill="#fff" opacity="0.85" stroke="#e2e8f0"/>
  <text x="400" y="260" text-anchor="middle" font-size="15" font-weight="600" fill="#1e293b">What changed?</text>
  <text x="400" y="290" text-anchor="middle" font-size="13" fill="#64748b">Classrooms to clinics to smartphones</text>
  <text x="400" y="320" text-anchor="middle" font-size="13" fill="#64748b">Same core question: how well does someone reason?</text>
  <text x="400" y="360" text-anchor="middle" font-size="13" fill="#64748b">Different tools, norms, and ethics each era</text>
</svg>
